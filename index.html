  function renderRowHTML(item, cols, group) {
    return `
      <div class="name-cell row-hover" data-action="open-item" data-item-id="${item.id}" style="border-left: 3px solid ${group.color}">
        <input type="checkbox" class="rounded border-slate-300" data-stop="1" />
        <span class="flex-1 truncate" contenteditable="true"
              data-action="rename-item" data-item-id="${item.id}"
              onclick="event.stopPropagation()">${escapeHTML(item.name)}</span>
        <i data-lucide="message-square" class="w-3.5 h-3.5 text-slate-300 open-icon"></i>
      </div>
      ${cols.map(c => renderCellHTML(item, c)).join('')}
      <div class="cell flex justify-center">
        <button class="text-slate-300 hover:text-rose-500 p-1" data-action="delete-item" data-item-id="${item.id}" title="Delete">
          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    `;
  }

  function renderCellHTML(item, col) {
    const v = item.values[col.id];
    if (col.type === 'status') {
      const c = statusColor(col, v);
      if (!v) {
        return `<div class="cell"><div class="status-pill empty w-full h-full" data-action="edit-status" data-item-id="${item.id}" data-col-id="${col.id}">—</div></div>`;
      }
      return `<div class="cell"><div class="status-pill w-full h-full" style="background:${c}" data-action="edit-status" data-item-id="${item.id}" data-col-id="${col.id}">${escapeHTML(v)}</div></div>`;
    }
    if (col.type === 'text') {
      return `<div class="cell"><div class="cell-pad text-slate-700 truncate" data-action="edit-text" data-item-id="${item.id}" data-col-id="${col.id}">${v ? escapeHTML(v) : '<span class="text-slate-300">+ Add</span>'}</div></div>`;
    }
    if (col.type === 'number') {
      return `<div class="cell"><div class="cell-pad justify-end text-slate-700 tabular-nums" data-action="edit-number" data-item-id="${item.id}" data-col-id="${col.id}">${v != null && v !== '' ? v : '<span class="text-slate-300">—</span>'}</div></div>`;
    }
    if (col.type === 'date') {
      return `<div class="cell"><div class="cell-pad text-slate-700" data-action="edit-date" data-item-id="${item.id}" data-col-id="${col.id}">${v ? formatDate(v) : '<span class="text-slate-300">—</span>'}</div></div>`;
    }
    if (col.type === 'person') {
      const arr = (v || []).map(getPerson).filter(Boolean);
      let inner;
      if (arr.length === 0) {
        inner = `<span class="text-slate-300">+ Assign</span>`;
      } else {
        inner = `<div class="avatar-stack flex items-center">${arr.slice(0, 4).map(p => `<span class="avatar" style="background:${p.color}" title="${escapeHTML(p.name)}">${initials(p.name)}</span>`).join('')}${arr.length > 4 ? `<span class="avatar bg-slate-400">+${arr.length-4}</span>` : ''}</div>`;
      }
      return `<div class="cell"><div class="cell-pad" data-action="edit-person" data-item-id="${item.id}" data-col-id="${col.id}">${inner}</div></div>`;
    }
    return `<div class="cell"></div>`;
  }

  // ============================================================================
  // RENDER — KANBAN
  // ============================================================================
  function renderKanban() {
    const board = getBoard();
    const view = document.getElementById('board-view');
    const statusCols = board.columns.filter(c => c.type === 'status');

    if (statusCols.length === 0) {
      view.innerHTML = `
        <div class="h-full flex items-center justify-center">
          <div class="text-center max-w-md p-8">
            <div class="w-12 h-12 mx-auto bg-indigo-50 rounded-xl flex items-center justify-center mb-4">
              <i data-lucide="columns-3" class="w-6 h-6 text-indigo-500"></i>
            </div>
            <h3 class="text-lg font-semibold mb-2">No status column</h3>
            <p class="text-sm text-slate-500 mb-4">Kanban groups items by status. Add a status column to your board to use this view.</p>
            <button class="btn-primary mx-auto" data-action="add-column" data-col-type="status">
              <i data-lucide="plus" class="w-4 h-4"></i> Add status column
            </button>
          </div>
        </div>
      `;
      lucide.createIcons();
      return;
    }

    const col = board.columns.find(c => c.id === board.kanbanColumnId) || statusCols[0];
    board.kanbanColumnId = col.id;
    const options = col.options || [];
    const all = applyFilters(board.items);
    const emptyBucket = all.filter(i => !i.values[col.id]);
    const buckets = options.map(opt => ({ opt, items: all.filter(i => i.values[col.id] === opt.label) }));
    if (emptyBucket.length) buckets.unshift({ opt: { label: 'No status', color: '#C4C4C4' }, items: emptyBucket, _empty: true });

    view.innerHTML = `
      <div class="px-6 py-4">
        ${statusCols.length > 1 ? `
          <div class="flex items-center gap-2 mb-3 text-sm text-slate-600">
            <span>Group by:</span>
            <select class="bg-white border border-slate-200 rounded-md px-2 py-1 text-sm outline-none focus:border-indigo-400" data-action="set-kanban-col">
              ${statusCols.map(c => `<option value="${c.id}" ${c.id === board.kanbanColumnId ? 'selected' : ''}>${escapeHTML(c.title)}</option>`).join('')}
            </select>
          </div>
        ` : ''}
        <div class="flex gap-3 overflow-x-auto pb-4 scrollbar-thin">
          ${buckets.map(b => `
            <div class="kanban-col flex-shrink-0" data-status-label="${b._empty ? '' : escapeHTML(b.opt.label)}" data-col-id="${col.id}">
              <div class="flex items-center justify-between mb-2 px-1">
                <div class="flex items-center gap-2">
                  <span class="inline-block w-2.5 h-2.5 rounded-full" style="background:${b.opt.color}"></span>
                  <span class="font-semibold text-[13px]" style="color:${b.opt.color}">${escapeHTML(b.opt.label)}</span>
                  <span class="text-xs text-slate-400">${b.items.length}</span>
                </div>
              </div>
              <div class="kanban-drop min-h-[60px]">
                ${b.items.map(item => renderKanbanCardHTML(item, board)).join('')}
              </div>
              ${b._empty ? '' : `
                <button class="w-full text-sm text-slate-500 hover:text-slate-900 py-1.5 px-2 rounded hover:bg-white/60 text-left flex items-center gap-1.5"
                        data-action="add-item-kanban" data-status-label="${escapeHTML(b.opt.label)}" data-col-id="${col.id}">
                  <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add item
                </button>
              `}
            </div>
          `).join('')}
        </div>
      </div>
    `;
    lucide.createIcons();
    bindKanbanDnD(view);
  }

  function renderKanbanCardHTML(item, board) {
    const personCol = board.columns.find(c => c.type === 'person');
    const dateCol = board.columns.find(c => c.type === 'date');
    const otherStatus = board.columns.filter(c => c.type === 'status' && c.id !== board.kanbanColumnId);
    const persons = personCol ? (item.values[personCol.id] || []).map(getPerson).filter(Boolean) : [];
    const date = dateCol ? item.values[dateCol.id] : '';
    return `
      <div class="kanban-card" draggable="true" data-action="open-item" data-item-id="${item.id}">
        <div class="font-medium text-sm mb-2 leading-snug">${escapeHTML(item.name)}</div>
        <div class="flex items-center justify-between gap-2 flex-wrap">
          <div class="flex items-center gap-1.5 flex-wrap">
            ${otherStatus.map(c => {
              const v = item.values[c.id];
              if (!v) return '';
              const color = statusColor(c, v);
              return `<span class="text-[10px] font-semibold px-1.5 py-0.5 rounded" style="background:${color}22; color:${color}">${escapeHTML(v)}</span>`;
            }).join('')}
          </div>
          <div class="flex items-center gap-2">
            ${date ? `<span class="text-[11px] text-slate-500 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3"></i>${formatDate(date, true)}</span>` : ''}
            ${persons.length ? `<div class="avatar-stack flex">${persons.slice(0,3).map(p => `<span class="avatar" style="background:${p.color}; width:22px; height:22px; font-size:9px">${initials(p.name)}</span>`).join('')}</div>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function bindKanbanDnD(root) {
    let draggingId = null;
    root.querySelectorAll('.kanban-card').forEach(card => {
      card.addEventListener('dragstart', e => {
        draggingId = card.dataset.itemId;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        draggingId = null;
        root.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('dragover'));
      });
    });
    root.querySelectorAll('.kanban-col').forEach(col => {
      col.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        col.classList.add('dragover');
      });
      col.addEventListener('dragleave', e => {
        if (!col.contains(e.relatedTarget)) col.classList.remove('dragover');
      });
      col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('dragover');
        if (!draggingId) return;
        const colId = col.dataset.colId;
        const newLabel = col.dataset.statusLabel || '';
        const it = getItem(draggingId);
        if (!it) return;
        it.values[colId] = newLabel || undefined;
        saveState();
        renderKanban();
      });
    });
  }

  // ============================================================================
  // RENDER — CALENDAR
  // ============================================================================
  let calCursor = startOfMonth(new Date());
  function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }

  function renderCalendar() {
    const board = getBoard();
    const view = document.getElementById('board-view');
    const dateCols = board.columns.filter(c => c.type === 'date');

    if (dateCols.length === 0) {
      view.innerHTML = `
        <div class="h-full flex items-center justify-center">
          <div class="text-center max-w-md p-8">
            <div class="w-12 h-12 mx-auto bg-indigo-50 rounded-xl flex items-center justify-center mb-4">
              <i data-lucide="calendar" class="w-6 h-6 text-indigo-500"></i>
            </div>
            <h3 class="text-lg font-semibold mb-2">No date column</h3>
            <p class="text-sm text-slate-500 mb-4">Calendar plots items by date. Add a date column to your board to use this view.</p>
            <button class="btn-primary mx-auto" data-action="add-column" data-col-type="date">
              <i data-lucide="plus" class="w-4 h-4"></i> Add date column
            </button>
          </div>
        </div>
      `;
      lucide.createIcons();
      return;
    }

    const col = board.columns.find(c => c.id === board.calendarColumnId) || dateCols[0];
    board.calendarColumnId = col.id;

    const year = calCursor.getFullYear();
    const month = calCursor.getMonth();
    const monthStart = new Date(year, month, 1);
    const monthEnd = new Date(year, month + 1, 0);
    const startDay = monthStart.getDay(); // 0 = Sunday
    const totalCells = Math.ceil((startDay + monthEnd.getDate()) / 7) * 7;

    const items = applyFilters(board.items);
    const itemsByDate = {};
    items.forEach(i => {
      const v = i.values[col.id];
      if (v) {
        if (!itemsByDate[v]) itemsByDate[v] = [];
        itemsByDate[v].push(i);
      }
    });

    const monthName = monthStart.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    const todayStr = new Date().toISOString().slice(0, 10);
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    let cells = '';
    for (let i = 0; i < totalCells; i++) {
      const dayIdx = i - startDay;
      const d = new Date(year, month, dayIdx + 1);
      const outside = d.getMonth() !== month;
      const ds = d.toISOString().slice(0, 10);
      const isToday = ds === todayStr;
      const dayItems = itemsByDate[ds] || [];
      cells += `
        <div class="cal-day ${outside ? 'outside' : ''} ${isToday ? 'today' : ''}">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold ${isToday ? 'text-indigo-600' : ''}">${d.getDate()}</span>
            ${!outside ? `<button class="text-slate-300 hover:text-indigo-500" data-action="add-item-date" data-date="${ds}" data-col-id="${col.id}"><i data-lucide="plus" class="w-3 h-3 pointer-events-none"></i></button>` : ''}
          </div>
          ${dayItems.slice(0, 4).map(it => {
            const statusCol = getBoard().columns.find(c => c.type === 'status');
            const statusVal = statusCol ? it.values[statusCol.id] : '';
            const color = statusCol && statusVal ? statusColor(statusCol, statusVal) : 'var(--c-accent)';
            return `<div class="cal-item" style="background:${color}" data-action="open-item" data-item-id="${it.id}" title="${escapeHTML(it.name)}">${escapeHTML(it.name)}</div>`;
          }).join('')}
          ${dayItems.length > 4 ? `<div class="text-[10px] text-slate-500 px-1">+${dayItems.length-4} more</div>` : ''}
        </div>
      `;
    }

    view.innerHTML = `
      <div class="px-6 py-4">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <button class="btn-ghost" data-action="cal-prev"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
            <h3 class="text-base font-semibold w-44 text-center">${monthName}</h3>
            <button class="btn-ghost" data-action="cal-next"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
            <button class="btn-ghost ml-2" data-action="cal-today">Today</button>
          </div>
          ${dateCols.length > 1 ? `
            <div class="flex items-center gap-2 text-sm text-slate-600">
              <span>Plot by:</span>
              <select class="bg-white border border-slate-200 rounded-md px-2 py-1 text-sm outline-none focus:border-indigo-400" data-action="set-calendar-col">
                ${dateCols.map(c => `<option value="${c.id}" ${c.id === board.calendarColumnId ? 'selected' : ''}>${escapeHTML(c.title)}</option>`).join('')}
              </select>
            </div>
          ` : ''}
        </div>
        <div class="grid grid-cols-7 gap-2 mb-2">
          ${dayNames.map(d => `<div class="text-xs font-semibold text-slate-500 text-center py-1">${d}</div>`).join('')}
        </div>
        <div class="grid grid-cols-7 gap-2">
          ${cells}
        </div>
      </div>
    `;
    lucide.createIcons();
  }

  // ============================================================================
  // RENDER — DRAWER
  // ============================================================================
  function openDrawer(itemId) {
    const item = getItem(itemId);
    if (!item) return;
    const board = getBoard();
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('backdrop');

    drawer.innerHTML = `
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="inline-block w-2 h-2 rounded-full" style="background:${getGroup(item.groupId)?.color || '#94A3B8'}"></span>
          <span class="text-xs text-slate-500">${escapeHTML(getGroup(item.groupId)?.name || '')}</span>
        </div>
        <button class="btn-ghost" data-action="close-drawer"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <div class="px-6 py-4 border-b border-slate-200">
        <h2 class="text-xl font-semibold outline-none rounded px-1 -mx-1 hover:bg-slate-50"
            contenteditable="true" data-action="rename-item-drawer" data-item-id="${item.id}">${escapeHTML(item.name)}</h2>
      </div>
      <div class="flex-1 overflow-y-auto scrollbar-thin px-6 py-4 space-y-3">
        ${board.columns.map(c => `
          <div class="grid grid-cols-[110px_1fr] gap-3 items-center">
            <span class="text-xs uppercase tracking-wide font-semibold text-slate-500">${escapeHTML(c.title)}</span>
            <div class="min-h-[36px] border border-slate-200 rounded-md flex items-center" style="height:36px">
              ${renderDrawerCellHTML(item, c)}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="px-6 py-3 border-t border-slate-200 flex items-center justify-between">
        <button class="text-sm text-rose-500 hover:text-rose-700 flex items-center gap-1.5"
                data-action="delete-item-drawer" data-item-id="${item.id}">
          <i data-lucide="trash-2" class="w-4 h-4"></i> Delete item
        </button>
        <span class="text-xs text-slate-400">#${item.id}</span>
      </div>
    `;
    drawer.classList.add('open');
    backdrop.classList.add('open');
    drawer.dataset.itemId = itemId;
    lucide.createIcons();
    bindCellEditors(drawer);
  }
  function renderDrawerCellHTML(item, col) {
    if (col.type === 'status') {
      const v = item.values[col.id];
      const color = statusColor(col, v);
      if (!v) return `<div class="status-pill empty flex-1 h-full" data-action="edit-status" data-item-id="${item.id}" data-col-id="${col.id}">—</div>`;
      return `<div class="status-pill flex-1 h-full" style="background:${color}" data-action="edit-status" data-item-id="${item.id}" data-col-id="${col.id}">${escapeHTML(v)}</div>`;
    }
    if (col.type === 'text') {
      const v = item.values[col.id];
      return `<div class="cell-pad text-slate-700" data-action="edit-text" data-item-id="${item.id}" data-col-id="${col.id}">${v ? escapeHTML(v) : '<span class="text-slate-300">+ Add</span>'}</div>`;
    }
    if (col.type === 'number') {
      const v = item.values[col.id];
      return `<div class="cell-pad text-slate-700 tabular-nums" data-action="edit-number" data-item-id="${item.id}" data-col-id="${col.id}">${v != null && v !== '' ? v : '<span class="text-slate-300">—</span>'}</div>`;
    }
    if (col.type === 'date') {
      const v = item.values[col.id];
      return `<div class="cell-pad text-slate-700" data-action="edit-date" data-item-id="${item.id}" data-col-id="${col.id}">${v ? formatDate(v) : '<span class="text-slate-300">—</span>'}</div>`;
    }
    if (col.type === 'person') {
      const arr = (item.values[col.id] || []).map(getPerson).filter(Boolean);
      const inner = arr.length === 0 ? `<span class="text-slate-300">+ Assign</span>` :
        `<div class="flex flex-wrap gap-1">${arr.map(p => `<span class="person-chip"><span class="avatar" style="background:${p.color}">${initials(p.name)}</span>${escapeHTML(p.name)}</span>`).join('')}</div>`;
      return `<div class="cell-pad" data-action="edit-person" data-item-id="${item.id}" data-col-id="${col.id}">${inner}</div>`;
    }
    return '';
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('backdrop').classList.remove('open');
  }

  // ============================================================================
  // RENDER — FULL
  // ============================================================================
  function renderAll() {
    renderSidebar();
    renderHeader();
    renderView();
  }

  // ============================================================================
  // CELL EDITORS
  // ============================================================================
  function bindCellEditors(root) {
    // Item name rename via contenteditable
    root.querySelectorAll('[data-action="rename-item"]').forEach(el => {
      el.addEventListener('blur', () => {
        const it = getItem(el.dataset.itemId);
        if (!it) return;
        const v = el.textContent.trim();
        if (v && v !== it.name) {
          it.name = v;
          saveState();
        } else if (!v) {
          el.textContent = it.name;
        }
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
        if (e.key === 'Escape') { el.textContent = getItem(el.dataset.itemId).name; el.blur(); }
      });
    });
  }

  // ============================================================================
  // POPOVERS
  // ============================================================================
  let activePopover = null;
  function openPopover(anchor, html, onMount) {
    closePopover();
    const root = document.getElementById('popover-root');
    const pop = document.createElement('div');
    pop.className = 'popover';
    pop.innerHTML = html;
    root.appendChild(pop);
    const rect = anchor.getBoundingClientRect();
    pop.style.top = (rect.bottom + 4) + 'px';
    pop.style.left = rect.left + 'px';
    // adjust if would overflow right
    const w = pop.offsetWidth;
    if (rect.left + w > window.innerWidth - 12) {
      pop.style.left = (window.innerWidth - w - 12) + 'px';
    }
    activePopover = pop;
    if (onMount) onMount(pop);
    setTimeout(() => {
      document.addEventListener('mousedown', popOutside);
    }, 0);
  }
  function popOutside(e) {
    if (activePopover && !activePopover.contains(e.target)) {
      closePopover();
    }
  }
  function closePopover() {
    if (activePopover) activePopover.remove();
    activePopover = null;
    document.removeEventListener('mousedown', popOutside);
  }

  function editStatus(itemId, colId, anchor) {
    const col = getColumn(colId);
    if (!col) return;
    const item = getItem(itemId);
    if (!item) return;
    const html = `
      <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-400 px-2 py-1">${escapeHTML(col.title)}</div>
      ${col.options.map(o => `
        <div class="popover-item" data-pick="${escapeHTML(o.label)}">
          <span class="w-3 h-3 rounded-full" style="background:${o.color}"></span>
          <span>${escapeHTML(o.label)}</span>
          ${item.values[colId] === o.label ? '<i data-lucide="check" class="w-3.5 h-3.5 ml-auto text-slate-400"></i>' : ''}
        </div>
      `).join('')}
      ${item.values[colId] ? `<div class="border-t border-slate-100 mt-1 pt-1"><div class="popover-item text-slate-500" data-pick=""><i data-lucide="x" class="w-3.5 h-3.5"></i><span>Clear</span></div></div>` : ''}
    `;
    openPopover(anchor, html, pop => {
      pop.querySelectorAll('[data-pick]').forEach(p => {
        p.addEventListener('click', () => {
          const label = p.dataset.pick;
          item.values[colId] = label || undefined;
          saveState();
          closePopover();
          const board = getBoard();
          if (board.activeView === 'table') renderTable();
          else if (board.activeView === 'kanban') renderKanban();
          else renderCalendar();
          if (document.getElementById('drawer').classList.contains('open') &&
              document.getElementById('drawer').dataset.itemId === itemId) openDrawer(itemId);
        });
      });
      lucide.createIcons();
    });
  }

  function editPerson(itemId, colId, anchor) {
    const item = getItem(itemId);
    if (!item) return;
    const selected = new Set(item.values[colId] || []);
    const html = `
      <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-400 px-2 py-1">Assign people</div>
      <div class="max-h-72 overflow-y-auto scrollbar-thin">
        ${state.people.map(p => `
          <div class="popover-item" data-pid="${p.id}">
            <span class="avatar" style="background:${p.color}; width:24px; height:24px">${initials(p.name)}</span>
            <span class="flex-1">${escapeHTML(p.name)}</span>
            <input type="checkbox" class="rounded border-slate-300 pointer-events-none" ${selected.has(p.id) ? 'checked' : ''} />
          </div>
        `).join('')}
      </div>
      <div class="border-t border-slate-100 mt-1 pt-1 px-2">
        <input id="new-person-input" type="text" placeholder="+ New person" class="w-full text-sm bg-slate-50 rounded px-2 py-1.5 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-200" />
      </div>
    `;
    openPopover(anchor, html, pop => {
      pop.querySelectorAll('[data-pid]').forEach(row => {
        row.addEventListener('click', () => {
          const pid = row.dataset.pid;
          if (selected.has(pid)) selected.delete(pid); else selected.add(pid);
          item.values[colId] = Array.from(selected);
          saveState();
          row.querySelector('input').checked = selected.has(pid);
          // re-render just the cell on table
          const board = getBoard();
          if (board.activeView === 'table') renderTable();
          else if (board.activeView === 'kanban') renderKanban();
          else renderCalendar();
          if (document.getElementById('drawer').classList.contains('open') &&
              document.getElementById('drawer').dataset.itemId === itemId) openDrawer(itemId);
        });
      });
      const inp = pop.querySelector('#new-person-input');
      inp?.addEventListener('keydown', e => {
        if (e.key === 'Enter' && inp.value.trim()) {
          const name = inp.value.trim();
          const newP = { id: uid('p'), name, color: PERSON_PALETTE[state.people.length % PERSON_PALETTE.length] };
          state.people.push(newP);
          selected.add(newP.id);
          item.values[colId] = Array.from(selected);
          saveState();
          editPerson(itemId, colId, anchor); // reopen
        }
      });
    });
  }

  function editDate(itemId, colId, anchor) {
    const item = getItem(itemId);
    if (!item) return;
    const cur = item.values[colId] || '';
    const html = `
      <div class="p-2">
        <input type="date" value="${cur}" class="border border-slate-200 rounded px-2 py-1.5 text-sm outline-none focus:border-indigo-400 w-full" id="date-pick" />
        <div class="flex justify-between mt-2">
          <button class="btn-ghost text-sm" data-action="clear-date">Clear</button>
          <button class="btn-primary text-sm" data-action="apply-date">Set</button>
        </div>
      </div>
    `;
    openPopover(anchor, html, pop => {
      const input = pop.querySelector('#date-pick');
      input.focus();
      pop.querySelector('[data-action="apply-date"]').addEventListener('click', () => {
        item.values[colId] = input.value || undefined;
        saveState(); closePopover(); rerenderAfterEdit(itemId);
      });
      pop.querySelector('[data-action="clear-date"]').addEventListener('click', () => {
        item.values[colId] = undefined;
        saveState(); closePopover(); rerenderAfterEdit(itemId);
      });
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          item.values[colId] = input.value || undefined;
          saveState(); closePopover(); rerenderAfterEdit(itemId);
        }
      });
    });
  }

  function editText(itemId, colId, anchor) {
    const item = getItem(itemId);
    if (!item) return;
    const cur = item.values[colId] || '';
    const html = `
      <div class="p-2">
        <textarea class="border border-slate-200 rounded px-2 py-1.5 text-sm outline-none focus:border-indigo-400 w-72 min-h-[80px] resize-y" id="text-edit">${escapeHTML(cur)}</textarea>
        <div class="flex justify-end mt-2 gap-2">
          <button class="btn-ghost text-sm" data-action="cancel-text">Cancel</button>
          <button class="btn-primary text-sm" data-action="apply-text">Save</button>
        </div>
      </div>
    `;
    openPopover(anchor, html, pop => {
      const ta = pop.querySelector('#text-edit');
      ta.focus();
      ta.setSelectionRange(ta.value.length, ta.value.length);
      pop.querySelector('[data-action="apply-text"]').addEventListener('click', () => {
        item.values[colId] = ta.value;
        saveState(); closePopover(); rerenderAfterEdit(itemId);
      });
      pop.querySelector('[data-action="cancel-text"]').addEventListener('click', closePopover);
    });
  }

  function editNumber(itemId, colId, anchor) {
    const item = getItem(itemId);
    if (!item) return;
    const cur = item.values[colId] != null ? item.values[colId] : '';
    const html = `
      <div class="p-2">
        <input type="number" value="${cur}" class="border border-slate-200 rounded px-2 py-1.5 text-sm outline-none focus:border-indigo-400 w-40" id="num-edit" />
        <div class="flex justify-end mt-2 gap-2">
          <button class="btn-ghost text-sm" data-action="cancel-num">Cancel</button>
          <button class="btn-primary text-sm" data-action="apply-num">Save</button>
        </div>
      </div>
    `;
    openPopover(anchor, html, pop => {
      const inp = pop.querySelector('#num-edit');
      inp.focus(); inp.select();
      const apply = () => {
        const v = inp.value === '' ? undefined : Number(inp.value);
        item.values[colId] = v;
        saveState(); closePopover(); rerenderAfterEdit(itemId);
      };
      pop.querySelector('[data-action="apply-num"]').addEventListener('click', apply);
      pop.querySelector('[data-action="cancel-num"]').addEventListener('click', closePopover);
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') apply(); });
    });
  }

  function rerenderAfterEdit(itemId) {
    const board = getBoard();
    if (board.activeView === 'table') renderTable();
    else if (board.activeView === 'kanban') renderKanban();
    else renderCalendar();
    if (document.getElementById('drawer').classList.contains('open') &&
        document.getElementById('drawer').dataset.itemId === itemId) openDrawer(itemId);
  }

  // ============================================================================
  // COLUMN MENU
  // ============================================================================
  function columnMenu(colId, anchor) {
    const col = getColumn(colId);
    const html = `
      <div class="popover-item" data-act="rename"><i data-lucide="pencil" class="w-3.5 h-3.5"></i><span>Rename column</span></div>
      <div class="popover-item" data-act="sort-asc"><i data-lucide="arrow-up" class="w-3.5 h-3.5"></i><span>Sort ascending</span></div>
      <div class="popover-item" data-act="sort-desc"><i data-lucide="arrow-down" class="w-3.5 h-3.5"></i><span>Sort descending</span></div>
      <div class="popover-item text-rose-600" data-act="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i><span>Delete column</span></div>
      <div class="border-t border-slate-100 mt-1 pt-1">
        <div class="popover-item" data-act="add-col"><i data-lucide="plus" class="w-3.5 h-3.5"></i><span>Add column</span></div>
      </div>
    `;
    openPopover(anchor, html, pop => {
      lucide.createIcons();
      pop.querySelector('[data-act="rename"]').onclick = () => {
        closePopover();
        const newName = prompt('Rename column:', col.title);
        if (newName && newName.trim()) {
          col.title = newName.trim(); saveState(); renderAll();
        }
      };
      pop.querySelector('[data-act="sort-asc"]').onclick = () => {
        getVF().sortBy = colId; getVF().sortDir = 'asc';
        closePopover(); renderAll();
      };
      pop.querySelector('[data-act="sort-desc"]').onclick = () => {
        getVF().sortBy = colId; getVF().sortDir = 'desc';
        closePopover(); renderAll();
      };
      pop.querySelector('[data-act="delete"]').onclick = () => {
        closePopover();
        const board = getBoard();
        const hasData = board.items.some(i => i.values[colId] != null && i.values[colId] !== '' && !(Array.isArray(i.values[colId]) && i.values[colId].length === 0));
        if (hasData && !confirm(`Delete column "${col.title}" and clear its values from all items?`)) return;
        board.columns = board.columns.filter(c => c.id !== colId);
        board.items.forEach(i => delete i.values[colId]);
        saveState(); renderAll();
      };
      pop.querySelector('[data-act="add-col"]').onclick = () => {
        closePopover(); openAddColumnDialog();
      };
    });
  }

  function openAddColumnDialog(presetType) {
    const html = `
      <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-400 px-2 py-1">Add column</div>
      ${[
        ['status','Status','tag','Colored labels'],
        ['text','Text','type','Free text'],
        ['date','Date','calendar','Date picker'],
        ['person','People','users','Assign people'],
        ['number','Number','hash','Numeric value']
      ].map(([t,l,ic,d]) => `
        <div class="popover-item" data-type="${t}">
          <i data-lucide="${ic}" class="w-4 h-4 text-slate-500"></i>
          <div class="flex flex-col">
            <span>${l}</span>
            <span class="text-[11px] text-slate-400">${d}</span>
          </div>
        </div>
      `).join('')}
    `;
    const fakeAnchor = { getBoundingClientRect: () => ({ left: window.innerWidth - 280, bottom: 60, right: window.innerWidth - 20 }) };
    openPopover(fakeAnchor, html, pop => {
      lucide.createIcons();
      pop.querySelectorAll('[data-type]').forEach(el => {
        el.onclick = () => {
          const t = el.dataset.type;
          const title = prompt(`Name for new ${t} column:`, t.charAt(0).toUpperCase() + t.slice(1));
          if (!title) return;
          const board = getBoard();
          const newCol = { id: uid('c'), title: title.trim(), type: t };
          if (t === 'status') newCol.options = STATUS_PRESET.slice();
          board.columns.push(newCol);
          saveState(); closePopover(); renderAll();
        };
      });
      if (presetType) {
        pop.querySelector(`[data-type="${presetType}"]`)?.click();
      }
    });
  }

  // ============================================================================
  // FILTERS POPOVER
  // ============================================================================
  function openFilters(anchor) {
    const board = getBoard();
    const vf = getVF();
    const statusCols = board.columns.filter(c => c.type === 'status');
    const personCol = board.columns.find(c => c.type === 'person');

    let html = `<div class="w-72 p-3 space-y-3">`;
    html += `<div class="text-[11px] uppercase tracking-wider font-semibold text-slate-400">Filters</div>`;
    statusCols.forEach(c => {
      const set = vf.statusFilters[c.id] = vf.statusFilters[c.id] || new Set();
      html += `<div>
        <div class="text-xs font-semibold text-slate-600 mb-1">${escapeHTML(c.title)}</div>
        <div class="flex flex-wrap gap-1">
          ${(c.options || []).map(o => `
            <span class="chip ${set.has(o.label) ? 'active' : ''}" data-filter-col="${c.id}" data-filter-val="${escapeHTML(o.label)}">
              <span class="w-2 h-2 rounded-full" style="background:${o.color}"></span>
              ${escapeHTML(o.label)}
            </span>
          `).join('')}
        </div>
      </div>`;
    });
    if (personCol) {
      html += `<div>
        <div class="text-xs font-semibold text-slate-600 mb-1">People</div>
        <div class="flex flex-wrap gap-1">
          ${state.people.map(p => `
            <span class="chip ${vf.personFilter.has(p.id) ? 'active' : ''}" data-filter-person="${p.id}">
              <span class="avatar" style="background:${p.color}; width:18px; height:18px; font-size:9px">${initials(p.name)}</span>
              ${escapeHTML(p.name)}
            </span>
          `).join('')}
        </div>
      </div>`;
    }
    html += `<div class="border-t border-slate-100 pt-2 flex justify-between">
      <button class="btn-ghost text-sm" data-act="clear-all">Clear all</button>
      <button class="btn-primary text-sm" data-act="close">Done</button>
    </div></div>`;

    openPopover(anchor, html, pop => {
      pop.querySelectorAll('[data-filter-val]').forEach(chip => {
        chip.onclick = () => {
          const cid = chip.dataset.filterCol, val = chip.dataset.filterVal;
          const set = vf.statusFilters[cid] = vf.statusFilters[cid] || new Set();
          if (set.has(val)) set.delete(val); else set.add(val);
          chip.classList.toggle('active');
          renderHeader();
          renderView();
        };
      });
      pop.querySelectorAll('[data-filter-person]').forEach(chip => {
        chip.onclick = () => {
          const pid = chip.dataset.filterPerson;
          if (vf.personFilter.has(pid)) vf.personFilter.delete(pid);
          else vf.personFilter.add(pid);
          chip.classList.toggle('active');
          renderHeader();
          renderView();
        };
      });
      pop.querySelector('[data-act="clear-all"]').onclick = () => {
        vf.statusFilters = {}; vf.personFilter.clear();
        closePopover(); renderAll();
      };
      pop.querySelector('[data-act="close"]').onclick = closePopover;
    });
  }

  function openSort(anchor) {
    const board = getBoard();
    const vf = getVF();
    const cols = [{ id: '__name__', title: 'Item name' }, ...board.columns];
    const html = `
      <div class="text-[11px] uppercase tracking-wider font-semibold text-slate-400 px-2 py-1">Sort by</div>
      ${cols.map(c => `
        <div class="popover-item" data-sort="${c.id}">
          <span class="flex-1">${escapeHTML(c.title)}</span>
          ${vf.sortBy === c.id ? `<span class="text-xs text-indigo-500">${vf.sortDir.toUpperCase()}</span>` : ''}
        </div>
      `).join('')}
      ${vf.sortBy ? `<div class="border-t border-slate-100 mt-1 pt-1">
        <div class="popover-item" data-sort-toggle><i data-lucide="arrow-up-down" class="w-3.5 h-3.5"></i><span>Toggle direction (${vf.sortDir})</span></div>
        <div class="popover-item text-slate-500" data-sort-clear><i data-lucide="x" class="w-3.5 h-3.5"></i><span>Clear sort</span></div>
      </div>` : ''}
    `;
    openPopover(anchor, html, pop => {
      lucide.createIcons();
      pop.querySelectorAll('[data-sort]').forEach(el => {
        el.onclick = () => {
          vf.sortBy = el.dataset.sort; vf.sortDir = 'asc';
          closePopover(); renderAll();
        };
      });
      pop.querySelector('[data-sort-toggle]')?.addEventListener('click', () => {
        vf.sortDir = vf.sortDir === 'asc' ? 'desc' : 'asc';
        closePopover(); renderAll();
      });
      pop.querySelector('[data-sort-clear]')?.addEventListener('click', () => {
        vf.sortBy = null; vf.sortDir = 'asc';
        closePopover(); renderAll();
      });
    });
  }

  // ============================================================================
  // BOARD MENU
  // ============================================================================
  function boardMenu(boardId, anchor) {
    const board = state.boards.find(b => b.id === boardId);
    const html = `
      <div class="popover-item" data-act="rename"><i data-lucide="pencil" class="w-3.5 h-3.5"></i>Rename board</div>
      <div class="popover-item" data-act="color"><i data-lucide="palette" class="w-3.5 h-3.5"></i>Change color</div>
      <div class="popover-item" data-act="duplicate"><i data-lucide="copy" class="w-3.5 h-3.5"></i>Duplicate board</div>
      <div class="popover-item text-rose-600" data-act="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Delete board</div>
    `;
    openPopover(anchor, html, pop => {
      lucide.createIcons();
      pop.querySelector('[data-act="rename"]').onclick = () => {
        closePopover();
        const n = prompt('Rename board:', board.name);
        if (n && n.trim()) { board.name = n.trim(); saveState(); renderAll(); }
      };
      pop.querySelector('[data-act="color"]').onclick = () => {
        closePopover();
        const palette = GROUP_PALETTE;
        const idx = palette.indexOf(board.color);
        board.color = palette[(idx + 1) % palette.length];
        saveState(); renderAll();
      };
      pop.querySelector('[data-act="duplicate"]').onclick = () => {
        closePopover();
        const idMap = {};
        const newGroups = board.groups.map(g => { const nid = uid('g'); idMap[g.id] = nid; return { ...g, id: nid }; });
        const newItems = board.items.map(i => ({ ...i, id: uid('i'), groupId: idMap[i.groupId], values: { ...i.values } }));
        const nb = { ...board, id: uid('b'), name: board.name + ' copy', groups: newGroups, items: newItems };
        state.boards.push(nb); state.activeBoardId = nb.id;
        saveState(); renderAll();
      };
      pop.querySelector('[data-act="delete"]').onclick = () => {
        closePopover();
        if (state.boards.length === 1) { toast('At least one board required'); return; }
        if (!confirm(`Delete board "${board.name}" and all its items?`)) return;
        state.boards = state.boards.filter(b => b.id !== boardId);
        if (state.activeBoardId === boardId) state.activeBoardId = state.boards[0].id;
        saveState(); renderAll();
      };
    });
  }

  function groupMenu(groupId, anchor) {
    const board = getBoard();
    const g = getGroup(groupId);
    const html = `
      <div class="popover-item" data-act="rename"><i data-lucide="pencil" class="w-3.5 h-3.5"></i>Rename group</div>
      <div class="popover-item" data-act="color"><i data-lucide="palette" class="w-3.5 h-3.5"></i>Change color</div>
      <div class="popover-item" data-act="collapse"><i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>${g.collapsed ? 'Expand' : 'Collapse'}</div>
      <div class="popover-item text-rose-600" data-act="delete"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Delete group</div>
    `;
    openPopover(anchor, html, pop => {
      lucide.createIcons();
      pop.querySelector('[data-act="rename"]').onclick = () => {
        closePopover();
        const n = prompt('Rename group:', g.name);
        if (n && n.trim()) { g.name = n.trim(); saveState(); renderAll(); }
      };
      pop.querySelector('[data-act="color"]').onclick = () => {
        closePopover();
        const idx = GROUP_PALETTE.indexOf(g.color);
        g.color = GROUP_PALETTE[(idx + 1) % GROUP_PALETTE.length];
        saveState(); renderAll();
      };
      pop.querySelector('[data-act="collapse"]').onclick = () => {
        closePopover();
        g.collapsed = !g.collapsed; saveState(); renderAll();
      };
      pop.querySelector('[data-act="delete"]').onclick = () => {
        closePopover();
        const itemCount = board.items.filter(i => i.groupId === groupId).length;
        if (itemCount && !confirm(`Delete group "${g.name}" and its ${itemCount} item${itemCount===1?'':'s'}?`)) return;
        board.groups = board.groups.filter(x => x.id !== groupId);
        board.items = board.items.filter(i => i.groupId !== groupId);
        if (board.groups.length === 0) {
          board.groups.push({ id: uid('g'), name: 'New group', color: GROUP_PALETTE[0], collapsed: false });
        }
        saveState(); renderAll();
      };
    });
  }

  // ============================================================================
  // PEOPLE MANAGER
  // ============================================================================
  function openPeopleManager() {
    const drawer = document.getElementById('drawer');
    const backdrop = document.getElementById('backdrop');
    drawer.innerHTML = `
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-lg font-semibold">People</h2>
        <button class="btn-ghost" data-action="close-drawer"><i data-lucide="x" class="w-4 h-4"></i></button>
      </div>
      <div class="flex-1 overflow-y-auto scrollbar-thin px-6 py-4 space-y-2" id="people-list">
        ${state.people.map(p => `
          <div class="flex items-center gap-3 p-2 hover:bg-slate-50 rounded-md">
            <span class="avatar" style="background:${p.color}; width:32px; height:32px; font-size:12px">${initials(p.name)}</span>
            <input class="flex-1 bg-transparent border-0 outline-none focus:bg-white focus:border-slate-200 border rounded px-2 py-1" value="${escapeHTML(p.name)}" data-pid="${p.id}" data-act="rename" />
            <button class="text-slate-300 hover:text-rose-500 p-1" data-pid="${p.id}" data-act="delete">
              <i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i>
            </button>
          </div>
        `).join('')}
      </div>
      <div class="px-6 py-3 border-t border-slate-200 flex gap-2">
        <input id="new-person-name" placeholder="New person name…" class="flex-1 px-3 py-2 border border-slate-200 rounded-md text-sm outline-none focus:border-indigo-400" />
        <button class="btn-primary" id="add-person-btn"><i data-lucide="plus" class="w-4 h-4"></i>Add</button>
      </div>
    `;
    drawer.classList.add('open');
    backdrop.classList.add('open');
    drawer.dataset.itemId = '';
    lucide.createIcons();

    drawer.querySelectorAll('[data-act="rename"]').forEach(inp => {
      inp.addEventListener('blur', () => {
        const p = getPerson(inp.dataset.pid);
        if (p && inp.value.trim()) { p.name = inp.value.trim(); saveState(); }
      });
    });
    drawer.querySelectorAll('[data-act="delete"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const pid = btn.dataset.pid;
        const p = getPerson(pid);
        if (!confirm(`Remove ${p.name}?`)) return;
        state.people = state.people.filter(x => x.id !== pid);
        // Remove from all item person columns
        state.boards.forEach(b => {
          const personCols = b.columns.filter(c => c.type === 'person');
          b.items.forEach(it => {
            personCols.forEach(c => {
              if (Array.isArray(it.values[c.id])) it.values[c.id] = it.values[c.id].filter(x => x !== pid);
            });
          });
        });
        saveState(); openPeopleManager(); renderView();
      });
    });
    document.getElementById('add-person-btn').addEventListener('click', () => {
      const inp = document.getElementById('new-person-name');
      const name = inp.value.trim();
      if (!name) return;
      state.people.push({ id: uid('p'), name, color: PERSON_PALETTE[state.people.length % PERSON_PALETTE.length] });
      saveState(); openPeopleManager();
    });
    document.getElementById('new-person-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('add-person-btn').click();
    });
  }

  // ============================================================================
  // ACTIONS / EVENT DELEGATION
  // ============================================================================
  document.addEventListener('click', e => {
    if (e.target.dataset?.stop) return;
    const action = e.target.closest('[data-action]')?.dataset.action;
    if (!action) return;
    const t = e.target.closest('[data-action]');

    if (action === 'switch-board') {
      state.activeBoardId = t.dataset.boardId; saveState(); renderAll(); return;
    }
    if (action === 'board-menu') {
      e.stopPropagation();
      boardMenu(t.dataset.boardId, t); return;
    }
    if (action === 'new-board') {
      const name = prompt('Board name:', 'New Board');
      if (!name) return;
      const color = GROUP_PALETTE[state.boards.length % GROUP_PALETTE.length];
      const b = {
        id: uid('b'), name: name.trim(), icon: 'kanban', color,
        groups: [{ id: uid('g'), name: 'Group', color, collapsed: false }],
        columns: [
          { id: uid('c'), title: 'Owner', type: 'person' },
          { id: uid('c'), title: 'Status', type: 'status', options: STATUS_PRESET.slice() },
          { id: uid('c'), title: 'Date', type: 'date' }
        ],
        items: [], activeView: 'table'
      };
      state.boards.push(b); state.activeBoardId = b.id;
      saveState(); renderAll(); return;
    }
    if (action === 'switch-view') {
      getBoard().activeView = t.dataset.view; saveState(); renderAll(); return;
    }
    if (action === 'rename-board') {
      // contenteditable handled on blur via listener bound below
      return;
    }
    if (action === 'toggle-group') {
      const g = getGroup(t.dataset.groupId); g.collapsed = !g.collapsed; saveState(); renderTable(); return;
    }
    if (action === 'group-menu') {
      e.stopPropagation(); groupMenu(t.dataset.groupId, t); return;
    }
    if (action === 'add-group') {
      const name = prompt('Group name:', 'New Group');
      if (!name) return;
      const board = getBoard();
      board.groups.push({ id: uid('g'), name: name.trim(), color: GROUP_PALETTE[board.groups.length % GROUP_PALETTE.length], collapsed: false });
      saveState(); renderTable(); return;
    }
    if (action === 'rename-group') return; // contenteditable

    if (action === 'add-item') {
      const board = getBoard();
      const newItem = { id: uid('i'), groupId: t.dataset.groupId, name: 'New item', values: {} };
      board.items.push(newItem); saveState(); renderTable();
      // Focus the new item name
      setTimeout(() => {
        const el = document.querySelector(`[data-action="rename-item"][data-item-id="${newItem.id}"]`);
        if (el) { el.focus(); document.getSelection().selectAllChildren(el); }
      }, 0);
      return;
    }
    if (action === 'add-item-kanban') {
      const board = getBoard();
      const groupId = board.groups[0]?.id;
      if (!groupId) return;
      const newItem = { id: uid('i'), groupId, name: 'New item', values: { [t.dataset.colId]: t.dataset.statusLabel } };
      board.items.push(newItem); saveState(); renderKanban();
      setTimeout(() => openDrawer(newItem.id), 50); return;
    }
    if (action === 'add-item-date') {
      const board = getBoard();
      const groupId = board.groups[0]?.id;
      if (!groupId) return;
      const newItem = { id: uid('i'), groupId, name: 'New item', values: { [t.dataset.colId]: t.dataset.date } };
      board.items.push(newItem); saveState(); renderCalendar();
      setTimeout(() => openDrawer(newItem.id), 50); return;
    }
    if (action === 'new-item') {
      const board = getBoard();
      const groupId = board.groups[0]?.id;
      if (!groupId) return;
      const newItem = { id: uid('i'), groupId, name: 'New item', values: {} };
      board.items.push(newItem); saveState(); renderView();
      setTimeout(() => openDrawer(newItem.id), 50); return;
    }
    if (action === 'rename-item') return; // contenteditable
    if (action === 'delete-item' || action === 'delete-item-drawer') {
      const id = t.dataset.itemId; const it = getItem(id);
      if (!it) return;
      if (!confirm(`Delete "${it.name}"?`)) return;
      const board = getBoard();
      board.items = board.items.filter(x => x.id !== id);
      saveState();
      if (action === 'delete-item-drawer') closeDrawer();
      renderView();
      return;
    }
    if (action === 'open-item') {
      // ignore if clicking the contenteditable directly or its trash button
      if (e.target.closest('[data-action="rename-item"]')) return;
      if (e.target.closest('[data-action="delete-item"]')) return;
      openDrawer(t.dataset.itemId); return;
    }
    if (action === 'close-drawer') { closeDrawer(); return; }
    if (action === 'rename-item-drawer') return; // contenteditable

    if (action === 'edit-status') { e.stopPropagation(); editStatus(t.dataset.itemId, t.dataset.colId, t); return; }
    if (action === 'edit-person') { e.stopPropagation(); editPerson(t.dataset.itemId, t.dataset.colId, t); return; }
    if (action === 'edit-date') { e.stopPropagation(); editDate(t.dataset.itemId, t.dataset.colId, t); return; }
    if (action === 'edit-text') { e.stopPropagation(); editText(t.dataset.itemId, t.dataset.colId, t); return; }
    if (action === 'edit-number') { e.stopPropagation(); editNumber(t.dataset.itemId, t.dataset.colId, t); return; }

    if (action === 'column-menu') { e.stopPropagation(); columnMenu(t.dataset.colId, t); return; }
    if (action === 'add-column') {
      openAddColumnDialog(t.dataset.colType); return;
    }
    if (action === 'open-filters') { e.stopPropagation(); openFilters(t); return; }
    if (action === 'open-sort') { e.stopPropagation(); openSort(t); return; }
    if (action === 'manage-people') { openPeopleManager(); return; }

    if (action === 'cal-prev') { calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth()-1, 1); renderCalendar(); return; }
    if (action === 'cal-next') { calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth()+1, 1); renderCalendar(); return; }
    if (action === 'cal-today') { calCursor = startOfMonth(new Date()); renderCalendar(); return; }

    if (action === 'export-json') { exportJSON(); return; }
    if (action === 'import-json') { document.getElementById('import-file').click(); return; }
  });

  // Backdrop closes drawer
  document.getElementById('backdrop').addEventListener('click', closeDrawer);

  // Contenteditable handlers (board name + group name + item name in drawer/table)
  document.addEventListener('blur', e => {
    const action = e.target.dataset?.action;
    if (action === 'rename-board') {
      const board = getBoard();
      const v = e.target.textContent.trim();
      if (v && v !== board.name) { board.name = v; saveState(); renderSidebar(); }
      else if (!v) e.target.textContent = board.name;
    }
    if (action === 'rename-group') {
      const g = getGroup(e.target.dataset.groupId);
      const v = e.target.textContent.trim();
      if (v && v !== g.name) { g.name = v; saveState(); }
      else if (!v) e.target.textContent = g.name;
    }
    if (action === 'rename-item' || action === 'rename-item-drawer') {
      const it = getItem(e.target.dataset.itemId);
      if (!it) return;
      const v = e.target.textContent.trim();
      if (v && v !== it.name) {
        it.name = v; saveState();
        if (action === 'rename-item-drawer') renderView();
      }
      else if (!v) e.target.textContent = it.name;
    }
  }, true);

  document.addEventListener('keydown', e => {
    const action = e.target.dataset?.action;
    if (['rename-board','rename-group','rename-item','rename-item-drawer'].includes(action)) {
      if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
      if (e.key === 'Escape') {
        e.preventDefault();
        if (action === 'rename-board') e.target.textContent = getBoard().name;
        else if (action === 'rename-group') e.target.textContent = getGroup(e.target.dataset.groupId).name;
        else e.target.textContent = getItem(e.target.dataset.itemId).name;
        e.target.blur();
      }
    }
    if (e.key === 'Escape') {
      if (activePopover) closePopover();
      else if (document.getElementById('drawer').classList.contains('open')) closeDrawer();
    }
  });

  // Kanban col change
  document.addEventListener('change', e => {
    if (e.target.dataset?.action === 'set-kanban-col') {
      getBoard().kanbanColumnId = e.target.value; saveState(); renderKanban();
    }
    if (e.target.dataset?.action === 'set-calendar-col') {
      getBoard().calendarColumnId = e.target.value; saveState(); renderCalendar();
    }
  });

  // ============================================================================
  // EXPORT / IMPORT
  // ============================================================================
  function exportJSON() {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0, 10);
    a.href = url; a.download = `monday-lite-backup-${stamp}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    toast('Backup downloaded');
  }
  document.getElementById('import-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed.boards || !Array.isArray(parsed.boards)) throw new Error('Invalid shape');
        if (!confirm(`Import ${parsed.boards.length} board(s)? This replaces current data.`)) return;
        state = parsed;
        // Convert person filter sets if any (they're per-session anyway)
        for (const k in viewFilters) delete viewFilters[k];
        saveState(); renderAll();
        toast('Data imported');
      } catch (err) {
        alert('Could not import: ' + err.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  // ============================================================================
  // UTILS
  // ============================================================================
  function escapeHTML(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }
  function initials(name) {
    return name.split(/\s+/).map(s => s[0]).slice(0, 2).join('').toUpperCase();
  }
  function formatDate(s, short = false) {
    if (!s) return '';
    const d = new Date(s + 'T12:00:00');
    if (isNaN(d)) return s;
    if (short) return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
  }
  function toast(msg) {
    const root = document.getElementById('toast-root');
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    root.appendChild(t);
    setTimeout(() => t.remove(), 2800);
  }

  // ============================================================================
  // INIT
  // ============================================================================
  renderAll();
  lucide.createIcons();
  </script>
</body>
</html>
