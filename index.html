<!DOCTYPE html>
<!-- Version: 1.0 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monday Lite — v1.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --c-done: #00C875;
      --c-working: #FDAB3D;
      --c-stuck: #E2445C;
      --c-review: #A25DDC;
      --c-blocked: #784BD1;
      --c-idle: #C4C4C4;
      --c-accent: #6366F1;
      --c-low: #579BFC;
      --c-med: #FDAB3D;
      --c-high: #E2445C;
    }
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    body { font-feature-settings: 'cv11', 'ss01', 'ss03'; }
    .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    [contenteditable]:focus { outline: none; }
    .status-pill {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0 10px; height: 28px; min-width: 92px; max-width: 100%;
      font-size: 12px; font-weight: 600; color: white;
      text-transform: none; letter-spacing: 0;
      cursor: pointer; user-select: none;
      transition: filter 120ms ease;
      border-radius: 0; /* Monday-style square pills inside cells */
    }
    .status-pill:hover { filter: brightness(1.06); }
    .status-pill.empty {
      background: repeating-linear-gradient(135deg, #e2e8f0 0, #e2e8f0 6px, #f1f5f9 6px, #f1f5f9 12px);
      color: #64748b;
    }
    .row-hover:hover { background-color: #f8fafc; }
    .group-bar { width: 4px; border-radius: 2px; }
    .cell {
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
      padding: 0; height: 36px;
      display: flex; align-items: center;
      font-size: 13px;
    }
    .cell-pad { padding: 0 12px; width: 100%; height: 100%; display: flex; align-items: center; gap: 6px; }
    .name-cell {
      border-bottom: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      padding: 0 12px;
      display: flex; align-items: center; gap: 8px;
      height: 36px; font-size: 14px;
      cursor: pointer;
    }
    .name-cell:hover .open-icon { opacity: 1; }
    .open-icon { opacity: 0; transition: opacity 120ms; }
    .col-header {
      font-size: 12px; font-weight: 600; color: #64748b;
      letter-spacing: 0.02em;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
      border-right: 1px solid #e5e7eb;
      height: 36px;
      display: flex; align-items: center;
      padding: 0 12px;
    }
    .avatar {
      width: 24px; height: 24px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      color: white; font-size: 10px; font-weight: 600;
      border: 2px solid white;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.04);
    }
    .avatar-stack > .avatar:not(:first-child) { margin-left: -8px; }
    .view-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px; font-size: 13px; font-weight: 500;
      color: #64748b; border-radius: 6px;
      cursor: pointer; transition: all 120ms;
    }
    .view-tab:hover { background: #f1f5f9; color: #1e293b; }
    .view-tab.active { background: white; color: var(--c-accent); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
    .sidebar-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 6px;
      font-size: 14px; color: #1e293b;
      cursor: pointer; transition: background 120ms;
    }
    .sidebar-btn:hover { background: #f1f5f9; }
    .sidebar-btn.active { background: #eef2ff; color: var(--c-accent); font-weight: 500; }
    .sidebar-btn.active .board-dot { box-shadow: 0 0 0 2px white, 0 0 0 3px var(--c-accent); }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 480px; max-width: 90vw;
      background: white; box-shadow: -8px 0 24px rgba(15, 23, 42, 0.08);
      transform: translateX(100%); transition: transform 220ms cubic-bezier(0.32, 0.72, 0.4, 1);
      z-index: 60; display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .backdrop {
      position: fixed; inset: 0; background: rgba(15,23,42,0.32);
      z-index: 55; opacity: 0; pointer-events: none;
      transition: opacity 180ms;
    }
    .backdrop.open { opacity: 1; pointer-events: auto; }
    .popover {
      position: absolute; z-index: 70;
      background: white; border-radius: 8px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.16), 0 0 0 1px rgba(15, 23, 42, 0.06);
      padding: 6px; min-width: 200px;
    }
    .popover-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 6px;
      font-size: 13px; cursor: pointer;
    }
    .popover-item:hover { background: #f1f5f9; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #0f172a; color: white; padding: 10px 16px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.16);
      z-index: 100;
      animation: toast-in 200ms ease, toast-out 200ms ease 2.4s forwards;
    }
    @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes toast-out { to { opacity: 0; transform: translate(-50%, 10px); } }
    .kanban-col { background: #f1f5f9; border-radius: 8px; padding: 8px; min-width: 280px; }
    .kanban-card {
      background: white; border-radius: 8px; padding: 10px 12px;
      box-shadow: 0 1px 2px rgba(15,23,42,0.06), 0 0 0 1px rgba(15,23,42,0.04);
      margin-bottom: 8px; cursor: grab;
      transition: transform 120ms, box-shadow 120ms;
    }
    .kanban-card:hover { box-shadow: 0 4px 12px rgba(15,23,42,0.1), 0 0 0 1px rgba(99,102,241,0.2); }
    .kanban-card.dragging { opacity: 0.4; cursor: grabbing; }
    .kanban-col.dragover { background: #e2e8f0; outline: 2px dashed var(--c-accent); outline-offset: -4px; }
    .cal-day {
      background: white; border-radius: 6px; padding: 6px 8px;
      min-height: 96px; border: 1px solid #e5e7eb;
      display: flex; flex-direction: column; gap: 4px;
    }
    .cal-day.today { border-color: var(--c-accent); box-shadow: 0 0 0 1px var(--c-accent); }
    .cal-day.outside { background: #f8fafc; color: #94a3b8; }
    .cal-item {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: var(--c-accent); color: white; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      background: white; border: 1px solid #e2e8f0;
      font-size: 12px; cursor: pointer; transition: all 120ms;
    }
    .chip:hover { border-color: #cbd5e1; }
    .chip.active { background: var(--c-accent); color: white; border-color: var(--c-accent); }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px; background: var(--c-accent); color: white;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: filter 120ms;
    }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px; color: #475569;
      border-radius: 6px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 120ms;
    }
    .btn-ghost:hover { background: #f1f5f9; color: #1e293b; }
    .input-inline {
      width: 100%; height: 100%; border: 0; outline: 0; background: transparent;
      font-size: 13px; padding: 0;
    }
    .input-inline:focus {
      background: white; box-shadow: 0 0 0 2px var(--c-accent) inset;
    }
    .group-toggle { transition: transform 160ms; }
    .group-toggle.collapsed { transform: rotate(-90deg); }
    .person-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f1f5f9; border-radius: 999px; padding: 2px 8px 2px 2px;
      font-size: 12px;
    }
    .person-chip .avatar { width: 20px; height: 20px; border-width: 0; box-shadow: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">
  <div id="app" class="h-full flex flex-col">
    <!-- TOP BAR -->
    <header class="h-12 px-4 bg-white border-b border-slate-200 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background: var(--c-accent)">
          <i data-lucide="layout-grid" class="w-4 h-4 text-white"></i>
        </div>
        <span class="font-semibold text-[15px]">Monday Lite</span>
        <span class="text-xs text-slate-400 ml-1">workspace</span>
      </div>
      <div class="flex items-center gap-2">
        <button class="btn-ghost" data-action="export-json" title="Download backup">
          <i data-lucide="download" class="w-4 h-4"></i>
          <span>Export</span>
        </button>
        <button class="btn-ghost" data-action="import-json" title="Restore from backup">
          <i data-lucide="upload" class="w-4 h-4"></i>
          <span>Import</span>
        </button>
        <input type="file" id="import-file" accept="application/json" class="hidden" />
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <!-- SIDEBAR -->
      <aside id="sidebar" class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="px-3 py-3 flex items-center justify-between">
          <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Boards</span>
          <button class="text-slate-500 hover:text-slate-900 p-1 rounded hover:bg-slate-100" data-action="new-board" title="New board">
            <i data-lucide="plus" class="w-4 h-4"></i>
          </button>
        </div>
        <div id="board-list" class="flex-1 px-2 overflow-y-auto scrollbar-thin"></div>
        <div class="px-3 py-3 border-t border-slate-200">
          <div class="text-[11px] text-slate-400 leading-tight">
            Local data · saved to this browser.<br/>
            Use <span class="font-medium text-slate-500">Export</span> for backup.
          </div>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="flex-1 flex flex-col overflow-hidden bg-slate-50">
        <div id="board-header"></div>
        <div id="board-view" class="flex-1 overflow-auto scrollbar-thin"></div>
      </main>
    </div>

    <!-- FOOTER -->
    <footer class="h-7 bg-white border-t border-slate-200 flex items-center justify-between px-4 text-[11px] text-slate-400">
      <span>Monday Lite · single-file work OS</span>
      <span class="font-medium" id="version-badge">v1.0</span>
    </footer>
  </div>

  <!-- DRAWER -->
  <div id="backdrop" class="backdrop"></div>
  <div id="drawer" class="drawer"></div>

  <!-- POPOVER ROOT -->
  <div id="popover-root"></div>
  <div id="toast-root"></div>

  <script>
  // ============================================================================
  // CONSTANTS & SEED
  // ============================================================================
  const STORAGE_KEY = 'monday-lite-state-v1';
  const VERSION = '1.0';

  const STATUS_PRESET = [
    { label: 'Done', color: '#00C875' },
    { label: 'Working on it', color: '#FDAB3D' },
    { label: 'Stuck', color: '#E2445C' },
    { label: 'Review', color: '#A25DDC' },
    { label: 'Not Started', color: '#C4C4C4' }
  ];
  const PRIORITY_PRESET = [
    { label: 'Critical', color: '#E2445C' },
    { label: 'High', color: '#FDAB3D' },
    { label: 'Medium', color: '#579BFC' },
    { label: 'Low', color: '#9CA3AF' }
  ];
  const CHANNEL_PRESET = [
    { label: 'Email', color: '#579BFC' },
    { label: 'Twitter', color: '#1DA1F2' },
    { label: 'LinkedIn', color: '#0A66C2' },
    { label: 'Blog', color: '#00C875' },
    { label: 'Paid', color: '#A25DDC' }
  ];
  const GROUP_PALETTE = ['#6366F1', '#10B981', '#F43F5E', '#F59E0B', '#0EA5E9', '#8B5CF6', '#14B8A6', '#EC4899'];
  const PERSON_PALETTE = ['#6366F1', '#10B981', '#F43F5E', '#F59E0B', '#0EA5E9', '#8B5CF6', '#14B8A6', '#EC4899'];

  function uid(prefix = '') {
    return prefix + Math.random().toString(36).slice(2, 9);
  }

  function seed() {
    const people = [
      { id: 'p1', name: 'Azlie M', color: '#6366F1' },
      { id: 'p2', name: 'Sarah K', color: '#10B981' },
      { id: 'p3', name: 'Marcus T', color: '#F43F5E' },
      { id: 'p4', name: 'Yuki I', color: '#F59E0B' },
      { id: 'p5', name: 'Devi P', color: '#0EA5E9' }
    ];

    const today = new Date();
    const dStr = d => d.toISOString().slice(0, 10);
    const addDays = n => { const d = new Date(today); d.setDate(d.getDate() + n); return dStr(d); };

    const board1 = {
      id: 'b1', name: 'Product Roadmap', icon: 'rocket', color: '#6366F1',
      groups: [
        { id: 'g1', name: 'Q2 Goals', color: '#6366F1', collapsed: false },
        { id: 'g2', name: 'In Development', color: '#F59E0B', collapsed: false },
        { id: 'g3', name: 'Backlog', color: '#94A3B8', collapsed: false }
      ],
      columns: [
        { id: 'c1', title: 'Owner', type: 'person' },
        { id: 'c2', title: 'Status', type: 'status', options: STATUS_PRESET.slice() },
        { id: 'c3', title: 'Priority', type: 'status', options: PRIORITY_PRESET.slice() },
        { id: 'c4', title: 'Due Date', type: 'date' },
        { id: 'c5', title: 'Effort', type: 'number' },
        { id: 'c6', title: 'Notes', type: 'text' }
      ],
      items: [
        { id: 'i1', groupId: 'g1', name: 'Launch redesigned dashboard',
          values: { c1: ['p1','p2'], c2: 'Working on it', c3: 'High', c4: addDays(12), c5: 8, c6: 'Wireframes signed off' }},
        { id: 'i2', groupId: 'g1', name: 'Mobile responsive navigation',
          values: { c1: ['p3'], c2: 'Review', c3: 'High', c4: addDays(4), c5: 5, c6: 'Final QA pass' }},
        { id: 'i3', groupId: 'g1', name: 'User onboarding flow',
          values: { c1: ['p2','p4'], c2: 'Stuck', c3: 'Critical', c4: addDays(-2), c5: 13, c6: 'Blocked on copy' }},
        { id: 'i4', groupId: 'g2', name: 'Status pill component',
          values: { c1: ['p1'], c2: 'Done', c3: 'Medium', c4: addDays(-7), c5: 3, c6: '' }},
        { id: 'i5', groupId: 'g2', name: 'Drag-and-drop kanban',
          values: { c1: ['p5'], c2: 'Working on it', c3: 'Medium', c4: addDays(6), c5: 5, c6: 'HTML5 DnD' }},
        { id: 'i6', groupId: 'g2', name: 'Search & filter bar',
          values: { c1: ['p3','p1'], c2: 'Working on it', c3: 'High', c4: addDays(8), c5: 5, c6: '' }},
        { id: 'i7', groupId: 'g3', name: 'Dark mode toggle',
          values: { c1: [], c2: 'Not Started', c3: 'Low', c4: '', c5: 2, c6: '' }},
        { id: 'i8', groupId: 'g3', name: 'Notification system',
          values: { c1: ['p4'], c2: 'Not Started', c3: 'Medium', c4: addDays(30), c5: 8, c6: '' }},
        { id: 'i9', groupId: 'g3', name: 'Activity log per board',
          values: { c1: [], c2: 'Not Started', c3: 'Low', c4: '', c5: 5, c6: '' }}
      ],
      activeView: 'table',
      kanbanColumnId: 'c2',
      calendarColumnId: 'c4'
    };

    const board2 = {
      id: 'b2', name: 'Marketing Sprints', icon: 'megaphone', color: '#F43F5E',
      groups: [
        { id: 'g4', name: 'This Week', color: '#F43F5E', collapsed: false },
        { id: 'g5', name: 'Next Week', color: '#0EA5E9', collapsed: false },
        { id: 'g6', name: 'Shipped', color: '#10B981', collapsed: false }
      ],
      columns: [
        { id: 'c1', title: 'Owner', type: 'person' },
        { id: 'c2', title: 'Status', type: 'status', options: STATUS_PRESET.slice() },
        { id: 'c3', title: 'Channel', type: 'status', options: CHANNEL_PRESET.slice() },
        { id: 'c4', title: 'Launch Date', type: 'date' },
        { id: 'c5', title: 'Budget', type: 'number' },
        { id: 'c6', title: 'Brief', type: 'text' }
      ],
      items: [
        { id: 'j1', groupId: 'g4', name: 'Q2 product launch campaign',
          values: { c1: ['p2'], c2: 'Working on it', c3: 'Twitter', c4: addDays(3), c5: 5000, c6: 'Multi-channel push' }},
        { id: 'j2', groupId: 'g4', name: 'Newsletter #14 — feature recap',
          values: { c1: ['p4'], c2: 'Review', c3: 'Email', c4: addDays(2), c5: 0, c6: 'Draft in progress' }},
        { id: 'j3', groupId: 'g4', name: 'Customer story: Acme Co.',
          values: { c1: ['p5','p2'], c2: 'Working on it', c3: 'Blog', c4: addDays(5), c5: 800, c6: 'Interview booked Tues' }},
        { id: 'j4', groupId: 'g5', name: 'Webinar registration page',
          values: { c1: ['p3'], c2: 'Not Started', c3: 'LinkedIn', c4: addDays(11), c5: 1200, c6: '' }},
        { id: 'j5', groupId: 'g5', name: 'Partner co-marketing brief',
          values: { c1: ['p2'], c2: 'Not Started', c3: 'Email', c4: addDays(14), c5: 0, c6: '' }},
        { id: 'j6', groupId: 'g6', name: 'Product Hunt launch',
          values: { c1: ['p1','p2','p4'], c2: 'Done', c3: 'Twitter', c4: addDays(-8), c5: 2400, c6: '#1 of the day' }},
        { id: 'j7', groupId: 'g6', name: 'Referral program copy refresh',
          values: { c1: ['p5'], c2: 'Done', c3: 'Email', c4: addDays(-14), c5: 0, c6: '' }}
      ],
      activeView: 'table',
      kanbanColumnId: 'c2',
      calendarColumnId: 'c4'
    };

    return { boards: [board1, board2], people, activeBoardId: 'b1' };
  }

  // ============================================================================
  // STATE
  // ============================================================================
  let state;
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !Array.isArray(s.boards)) return null;
      return s;
    } catch { return null; }
  }
  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }
  state = loadState() || seed();

  // ============================================================================
  // QUERIES
  // ============================================================================
  function getBoard() { return state.boards.find(b => b.id === state.activeBoardId) || state.boards[0]; }
  function getItem(id) { return getBoard().items.find(i => i.id === id); }
  function getGroup(id) { return getBoard().groups.find(g => g.id === id); }
  function getColumn(id) { return getBoard().columns.find(c => c.id === id); }
  function getPerson(id) { return state.people.find(p => p.id === id); }
  function statusColor(col, label) {
    const opt = (col.options || []).find(o => o.label === label);
    return opt ? opt.color : null;
  }

  // ============================================================================
  // VIEW FILTER STATE (per board, in-memory only)
  // ============================================================================
  const viewFilters = {}; // { boardId: { search, statusFilters: {colId: Set}, personFilter: Set, sortBy, sortDir } }
  function getVF() {
    const bid = state.activeBoardId;
    if (!viewFilters[bid]) viewFilters[bid] = {
      search: '', statusFilters: {}, personFilter: new Set(), sortBy: null, sortDir: 'asc'
    };
    return viewFilters[bid];
  }

  function applyFilters(items) {
    const board = getBoard();
    const vf = getVF();
    let out = items.slice();
    if (vf.search) {
      const q = vf.search.toLowerCase();
      out = out.filter(i => i.name.toLowerCase().includes(q));
    }
    // status filters per status column
    for (const [colId, set] of Object.entries(vf.statusFilters)) {
      if (set && set.size > 0) {
        out = out.filter(i => set.has(i.values[colId]));
      }
    }
    if (vf.personFilter && vf.personFilter.size > 0) {
      out = out.filter(i => {
        const personCol = board.columns.find(c => c.type === 'person');
        if (!personCol) return false;
        const arr = i.values[personCol.id] || [];
        return arr.some(pid => vf.personFilter.has(pid));
      });
    }
    if (vf.sortBy) {
      const col = board.columns.find(c => c.id === vf.sortBy) || { id: '__name__', type: 'text' };
      const dir = vf.sortDir === 'desc' ? -1 : 1;
      out.sort((a, b) => {
        let av, bv;
        if (vf.sortBy === '__name__') { av = a.name; bv = b.name; }
        else { av = a.values[col.id]; bv = b.values[col.id]; }
        if (col.type === 'person') {
          av = (av && av.length) ? (getPerson(av[0])?.name || '') : '';
          bv = (bv && bv.length) ? (getPerson(bv[0])?.name || '') : '';
        } else if (col.type === 'number') {
          av = av == null ? -Infinity : Number(av);
          bv = bv == null ? -Infinity : Number(bv);
        } else if (col.type === 'status') {
          av = av || ''; bv = bv || '';
        } else {
          av = (av || '').toString(); bv = (bv || '').toString();
        }
        if (av < bv) return -1 * dir;
        if (av > bv) return 1 * dir;
        return 0;
      });
    }
    return out;
  }

  // ============================================================================
  // RENDER — VIEW DISPATCH

  function renderView() {

  // ============================================================================
  // RENDER — TABLE
  // ============================================================================
  function renderTable() {
    const board = getBoard();
    const view = document.getElementById('board-view');

        <div class="mb-6" data-group-id="${g.id}">

            </button>
          </div>
          ${g.collapsed ? '' : `
            <div class="bg-white rounded-lg overflow-hidden shadow-[0_1px_2px_rgba(15,23,42,0.04),0_0_0_1px_rgba(15,23,42,0.06)]">

        <i data-lucide="plus" class="w-4 h-4"></i> Add group
      </button>
    </div>`;

    view.innerHTML = html;
    lucide.createIcons();
    bindCellEditors(view);
